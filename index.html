<!doctype html>

<head>

  <title>InfraOps Lab: Simulador de Infraestructura con IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg1:#081226;
      --bg2:#0d1b39;
      --panel:#0f172acc;
      --card:#111827ee;
      --line:#24314f;
      --soft:#94a3b8;
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --accent:#38bdf8;
      --accent2:#8b5cf6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:#e5eefc;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 8% 5%, rgba(56,189,248,.16), transparent 45%),
        radial-gradient(900px 550px at 92% 10%, rgba(139,92,246,.14), transparent 45%),
        linear-gradient(180deg,var(--bg2),var(--bg1));
      min-height:100vh;
    }
    .glass{
      background:linear-gradient(180deg, rgba(15,23,42,.92), rgba(2,6,23,.92));
      border:1px solid rgba(148,163,184,.16);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
    }
    .metric-bar{
      height:12px;
      border-radius:999px;
      overflow:hidden;
      background:#1f2937;
      border:1px solid rgba(255,255,255,.05);
    }
    .metric-fill{
      height:100%;
      border-radius:999px;
      transition:width .45s ease;
    }
    .option-card{
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .option-card:hover{
      transform:translateY(-2px);
      border-color:rgba(56,189,248,.55);
      box-shadow:0 10px 25px rgba(56,189,248,.12);
      background:rgba(15,23,42,.95);
    }
    .pill{
      border:1px solid rgba(148,163,184,.18);
      background:rgba(15,23,42,.75);
    }
    .terminal{
      background:linear-gradient(180deg,#08111f,#040812);
      border:1px solid rgba(56,189,248,.18);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .blink::after{
      content:'▍';
      margin-left:4px;
      animation:blink 1s step-end infinite;
      color:#38bdf8;
    }
    @keyframes blink{50%{opacity:0}}
    .fade-in{animation:fadeIn .4s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .grid-bg{
      background-image:
        linear-gradient(rgba(148,163,184,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,.06) 1px, transparent 1px);
      background-size: 28px 28px;
      background-position: center;
    }
    .choice-good{border-color:rgba(34,197,94,.6)!important; box-shadow:0 0 0 1px rgba(34,197,94,.2), 0 12px 30px rgba(34,197,94,.12)!important}
    .choice-bad{border-color:rgba(239,68,68,.6)!important; box-shadow:0 0 0 1px rgba(239,68,68,.2), 0 12px 30px rgba(239,68,68,.12)!important}
    .choice-neutral{border-color:rgba(245,158,11,.6)!important; box-shadow:0 0 0 1px rgba(245,158,11,.2), 0 12px 30px rgba(245,158,11,.12)!important}
    .icon-node{display:flex;align-items:center;gap:.55rem;padding:.7rem .85rem;border-radius:1rem;border:1px solid rgba(148,163,184,.16);background:rgba(2,6,23,.55)}
    .icon-badge{width:2rem;height:2rem;border-radius:.85rem;display:flex;align-items:center;justify-content:center;font-size:1rem;background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.22)}
    .input-dark{background:rgba(2,6,23,.65);border:1px solid rgba(148,163,184,.18);color:#e5eefc}
    .input-dark:focus{outline:none;border-color:rgba(56,189,248,.7);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
  </style>
</head>

    const app = document.getElementById('app');

    function cloneData(obj){ return JSON.parse(JSON.stringify(obj)); }
    function clamp(v){ return Math.max(0, Math.min(100, v)); }

    function initializeMissions(){
      state.missions = cloneData(BASE_MISSIONS).map(m => state.dynamicMode ? randomizeMission(m) : m);
    }

    function randomizeMission(mission){
      const m = cloneData(mission);
      const variants = [
        'Se detecta además degradación intermitente en horarios de mayor demanda.',
        'El incidente presenta variabilidad y complica el diagnóstico inicial.',
        'Existen restricciones presupuestales para la respuesta inmediata.',
        'Usuarios de áreas críticas reportan impacto mayor al esperado.'
      ];
      const pick = variants[Math.floor(Math.random()*variants.length)];
      m.context += ' ' + pick;
      if(m.indicators && m.indicators.length){
        m.indicators = [...m.indicators].sort(() => Math.random() - 0.5);
      }
      if(m.options && m.options.length){
        m.options = [...m.options].sort(() => Math.random() - 0.5);
      }
      if(m.followups){
        m.followups = m.followups.map(f => ({...f, options:[...f.options].sort(() => Math.random() - 0.5)}));
      }
      return m;
    }

    function applyImpact(impact){
      state.metrics.availability = clamp(state.metrics.availability + (impact.availability || 0));
      state.metrics.performance  = clamp(state.metrics.performance  + (impact.performance  || 0));
      state.metrics.security     = clamp(state.metrics.security     + (impact.security     || 0));
      state.metrics.budget       = clamp(state.metrics.budget       + (impact.budget       || 0));
      state.score += impact.score || 0;
    }

    function overallHealth(){
      const {availability, performance, security, budget} = state.metrics;
      return Math.round((availability + performance + security + budget) / 4);
    }

    function healthTone(v){
      if(v >= 75) return 'text-emerald-400';
      if(v >= 50) return 'text-amber-400';
      return 'text-rose-400';
    }

    function metricColor(v){
      if(v >= 75) return 'linear-gradient(90deg, #22c55e, #4ade80)';
      if(v >= 50) return 'linear-gradient(90deg, #f59e0b, #fbbf24)';
      return 'linear-gradient(90deg, #ef4444, #fb7185)';
    }

    function getMission(){ return state.missions[state.missionIndex]; }

    function getCurrentStage(){
      const mission = getMission();
      if(state.step === 0){
        return { question: mission.context, options: mission.options, prompt: 'Selecciona la primera acción prioritaria' };
      }
      return mission.followups[state.step - 1];
    }

    function makeVerificationCode(name){
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth()+1).padStart(2,'0');
      const dd = String(now.getDate()).padStart(2,'0');
      const hh = String(now.getHours()).padStart(2,'0');
      const mi = String(now.getMinutes()).padStart(2,'0');
      const ss = String(now.getSeconds()).padStart(2,'0');
      const base = name.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,8) || 'STUDENT';
      const seq = Math.floor(100 + Math.random() * 900);
      return `${base}-${yyyy}${mm}${dd}-${hh}${mi}${ss}-${seq}`;
    }

    function saveRanking(){
      const entry = {
        student: state.studentName,
        group: state.studentGroup || 'Sin grupo',
        score: state.score + overallHealth(),
        health: overallHealth(),
        mission: getMission()?.title || 'Simulación',
        code: state.verificationCode,
        date: new Date().toLocaleString('es-CO')
      };
      const current = JSON.parse(localStorage.getItem('infraops-ranking') || '[]');
      current.push(entry);
      current.sort((a,b) => b.score - a.score);
      localStorage.setItem('infraops-ranking', JSON.stringify(current.slice(0,20)));
      state.ranking = current.slice(0,10);
    }

    function loadRanking(){
      state.ranking = JSON.parse(localStorage.getItem('infraops-ranking') || '[]').slice(0,10);
    }

    function computeRubric(){
      const good = state.decisions.filter(d => d.type === 'good').length;
      const neutral = state.decisions.filter(d => d.type === 'neutral').length;
      state.rubric.tecnico = Math.min(5, Math.max(1, Math.round((state.metrics.performance + state.metrics.availability) / 40)));
      state.rubric.analisis = Math.min(5, Math.max(1, good + (neutral ? 1 : 0)));
      state.rubric.continuidad = Math.min(5, Math.max(1, Math.round(state.metrics.availability / 20)));
      state.rubric.seguridad = Math.min(5, Math.max(1, Math.round(state.metrics.security / 20)));
    }

    function startTimer(){
      stopTimer();
      state.timerId = setInterval(() => {
        state.timeLeft -= 1;
        if(state.timeLeft <= 0){
          state.timeLeft = 0;
          state.logs.unshift('[SYS] Tiempo agotado. El incidente escala automáticamente.');
          state.lives = Math.max(0, state.lives - 1);
          stopTimer();
          state.screen = 'results';
          computeRubric();
          saveRanking();
        }
        render();
      }, 1000);
    }

    function stopTimer(){ if(state.timerId){ clearInterval(state.timerId); state.timerId = null; } }

    function formatTime(sec){
      const m = String(Math.floor(sec / 60)).padStart(2,'0');
      const s = String(sec % 60).padStart(2,'0');
      return `${m}:${s}`;
    }

    function resetRun(toAuth=false){
      stopTimer();
      state.screen = toAuth ? 'auth' : 'home';
      state.missionIndex = 0;
      state.step = 0;
      state.score = 0;
      state.answered = false;
      state.selectedOptionIndex = null;
      state.verificationCode = toAuth ? '' : state.verificationCode;
      state.lives = 3;
      state.timeLeft = 180;
      state.metrics = { availability:60, performance:58, security:62, budget:75 };
      state.logs = [
        '[IA] Motor de simulación listo.',
        '[SYS] Esperando inicio de misión.',
        '[OPS] Sin incidentes activos en este momento.'
      ];
      state.decisions = [];
      state.rubric = { tecnico:0, analisis:0, continuidad:0, seguridad:0 };
      initializeMissions();
      loadRanking();
      render();
    }

    function submitStudentForm(){
      const name = document.getElementById('studentName')?.value.trim();
      const group = document.getElementById('studentGroup')?.value.trim();
      const teacherMode = document.getElementById('teacherMode')?.checked;
      const dynamicMode = document.getElementById('dynamicMode')?.checked;
      if(!name){ alert('Ingresa el nombre del estudiante.'); return; }
      state.studentName = name;
      state.studentGroup = group;
      state.teacherMode = !!teacherMode;
      state.dynamicMode = !!dynamicMode;
      state.verificationCode = makeVerificationCode(name);
      initializeMissions();
      loadRanking();
      state.screen = 'home';
      render();
    }

    function startMission(index){
      state.screen = 'mission';
      state.missionIndex = index;
      state.step = 0;
      state.score = 0;
      state.answered = false;
      state.selectedOptionIndex = null;
      state.lives = 3;
      state.timeLeft = 180;
      state.metrics = { availability:60, performance:58, security:62, budget:75 };
      state.logs = [
        `[IA] Misión cargada: ${state.missions[index].title}`,
        `[SYS] Código de verificación de sesión: ${state.verificationCode}`,
        '[OPS] Esperando decisión del administrador.'
      ];
      state.decisions = [];
      state.rubric = { tecnico:0, analisis:0, continuidad:0, seguridad:0 };
      startTimer();
      render();
    }

    function chooseOption(idx){
      if(state.answered) return;
      const stage = getCurrentStage();
      const choice = stage.options[idx];
      state.selectedOptionIndex = idx;
      state.answered = true;
      applyImpact(choice.impact);
      if(choice.type === 'bad') state.lives = Math.max(0, state.lives - 1);
      state.decisions.push({ step: state.step, title: choice.title, type: choice.type, rationale: choice.rationale });
      state.logs.unshift(`[OPS] Acción ejecutada: ${choice.title}`);
      state.logs.unshift(`[IA] ${choice.type === 'good' ? 'Buena práctica detectada.' : choice.type === 'bad' ? 'Riesgo operativo detectado.' : 'Acción parcialmente efectiva detectada.'}`);
      state.logs.unshift(`[SYS] Salud actual del servicio: ${overallHealth()}%`);
      if(state.lives <= 0){
        stopTimer();
        state.screen = 'results';
        computeRubric();
        saveRanking();
      }
      render();
    }

    function nextStage(){
      const mission = getMission();
      state.answered = false;
      state.selectedOptionIndex = null;
      state.step += 1;
      if(state.step > mission.followups.length){
        stopTimer();
        computeRubric();
        saveRanking();
        state.screen = 'results';
      } else {
        state.logs.unshift('[SYS] Nueva señal de telemetría recibida.');
      }
      render();
    }

      const score = state.score + overallHealth();
      if(score >= 165) return {label:'Arquitecta de Infraestructura', tone:'text-emerald-400', desc:'Gestionaste el incidente con criterio técnico, equilibrio operativo y visión sistémica.'};
      if(score >= 130) return {label:'Operadora de Alta Capacidad', tone:'text-sky-400', desc:'Tomaste buenas decisiones y mantuviste la continuidad con base técnica consistente.'};
      if(score >= 95) return {label:'Analista en Desarrollo', tone:'text-amber-400', desc:'Respondiste parcialmente bien, aunque aún hay oportunidades de priorización y diseño.'};
      return {label:'Incidente Escalado', tone:'text-rose-400', desc:'La crisis superó la contención esperada. Hace falta mejorar análisis, secuencia y criterios de recuperación.'};
    }

    initializeMissions();
    loadRanking();
    render();
  </script>
